<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-label="RedMed">
  <defs>
    <linearGradient id="plate" x1="0.15" y1="0" x2="0.9" y2="1">
      <stop offset="0%" stop-color="#fff1f2"/>
      <stop offset="45%" stop-color="#ffe4e6"/>
      <stop offset="100%" stop-color="#fecdd3"/>
    </linearGradient>
    <radialGradient id="bloom" cx="0.28" cy="0.2" r="0.72">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cross" x1="0.2" y1="0" x2="0.85" y2="1">
      <stop offset="0%" stop-color="#f6d4a3"/>
      <stop offset="40%" stop-color="#d4a05c"/>
      <stop offset="100%" stop-color="#8a5a28"/>
    </linearGradient>
    <linearGradient id="snake" x1="0.15" y1="0" x2="0.9" y2="1">
      <stop offset="0%" stop-color="#fb7185"/>
      <stop offset="50%" stop-color="#e11d48"/>
      <stop offset="100%" stop-color="#9f1239"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e11d48"/>
      <stop offset="100%" stop-color="#9f1239"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#9f1239" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- App plate -->
  <rect width="1024" height="1024" rx="240" fill="url(#plate)"/>
  <rect width="1024" height="1024" rx="240" fill="url(#bloom)"/>
  <rect x="36" y="36" width="952" height="952" rx="214" fill="none" stroke="url(#ring)" stroke-width="28" opacity="0.88"/>

  <g transform="translate(512 520) scale(0.86) translate(-512 -500)" filter="url(#soft)">
    <!-- Bronze medical cross -->
    <g fill="url(#cross)">
      <rect x="452" y="168" width="120" height="664" rx="60"/>
      <rect x="288" y="332" width="448" height="120" rx="60"/>
    </g>
    <!-- Inner highlight cut for depth -->
    <g fill="#fff8ef" fill-opacity="0.28">
      <rect x="476" y="196" width="36" height="608" rx="18"/>
      <rect x="316" y="360" width="392" height="36" rx="18"/>
    </g>

    <!-- Asclepius serpent — one bold coil -->
    <g stroke-linecap="round" stroke-linejoin="round" fill="none">
      <path stroke="#1c1917" stroke-width="78" opacity="0.12"
            d="M 378 820
               C 330 730, 318 610, 392 520
               C 470 420, 690 410, 678 300
               C 668 210, 600 168, 548 148"/>
      <path stroke="url(#snake)" stroke-width="58"
            d="M 378 820
               C 330 730, 318 610, 392 520
               C 470 420, 690 410, 678 300
               C 668 210, 600 168, 548 148"/>
    </g>
    <circle cx="548" cy="144" r="46" fill="#1c1917" opacity="0.14"/>
    <circle cx="548" cy="144" r="40" fill="url(#snake)"/>
    <circle cx="562" cy="134" r="8" fill="#fff7f8"/>
  </g>
</svg>
