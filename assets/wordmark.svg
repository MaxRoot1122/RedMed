<svg xmlns="http://www.w3.org/2000/svg" width="360" height="88" viewBox="0 0 360 88" role="img" aria-label="RedMed">
  <defs>
    <linearGradient id="plate" x1="0.15" y1="0" x2="0.9" y2="1">
      <stop offset="0%" stop-color="#fff1f2"/>
      <stop offset="55%" stop-color="#ffe4e6"/>
      <stop offset="100%" stop-color="#fecdd3"/>
    </linearGradient>
    <linearGradient id="cross" x1="0.2" y1="0" x2="0.85" y2="1">
      <stop offset="0%" stop-color="#f6d4a3"/>
      <stop offset="40%" stop-color="#d4a05c"/>
      <stop offset="100%" stop-color="#8a5a28"/>
    </linearGradient>
    <linearGradient id="snake" x1="0.15" y1="0" x2="0.9" y2="1">
      <stop offset="0%" stop-color="#fb7185"/>
      <stop offset="50%" stop-color="#e11d48"/>
      <stop offset="100%" stop-color="#9f1239"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e11d48"/>
      <stop offset="100%" stop-color="#9f1239"/>
    </linearGradient>
    <linearGradient id="redType" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fb7185"/>
      <stop offset="100%" stop-color="#e11d48"/>
    </linearGradient>
  </defs>
  <!-- Mini app-cover plate (same family as icon.svg) -->
  <rect x="4" y="8" width="72" height="72" rx="20" fill="url(#plate)"/>
  <rect x="8" y="12" width="64" height="64" rx="17" fill="none" stroke="url(#ring)" stroke-width="2.5" opacity="0.85"/>
  <g transform="translate(40 46) scale(0.118) translate(-512 -500)">
    <g fill="url(#cross)">
