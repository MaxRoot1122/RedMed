    </g>
    <circle cx="548" cy="144" r="40" fill="url(#snake)"/>
    <circle cx="562" cy="134" r="8" fill="#fff7f8"/>
  </g>
  <text x="92" y="54" font-family="ui-rounded, 'SF Pro Rounded', 'Avenir Next Rounded', system-ui, sans-serif" font-size="38" font-weight="800" letter-spacing="-1.2">
    <tspan fill="url(#redType)">Red</tspan><tspan fill="#1c1917">Med</tspan>
  </text>
  <text x="94" y="72" font-family="ui-rounded, 'SF Pro Rounded', system-ui, sans-serif" font-size="9.5" font-weight="700" fill="#78716c" letter-spacing="1.4">MEDICAL ID</text>
