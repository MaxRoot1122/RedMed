# Deploy GitHub Pages
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      # Pin to commit SHAs (not mutable tags) — bracelet cards load this deploy.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Build static site
        run: |
          mkdir -p _site/.well-known _site/config
          cp index.html privacy-policy.html terms-of-service.html manifest.json get.html _site/
          cp -R assets _site/assets
          cp .well-known/assetlinks.json _site/.well-known/assetlinks.json
          if [ -f CNAME ]; then cp CNAME _site/CNAME; fi
          if [ -n "${{ secrets.GOOGLE_MAPS_API_KEY }}" ]; then
            printf '%s' "${{ secrets.GOOGLE_MAPS_API_KEY }}" > _site/config/google-api-key
          elif [ -f config/google-api-key ]; then
            cp config/google-api-key _site/config/google-api-key
          else
            : > _site/config/google-api-key
          fi
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
