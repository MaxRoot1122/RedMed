<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RedMed — iPhone 17 preview</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: #1a1a1e;
      color: #e8e8ed;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
    }
    .wrap {
      min-height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 16px;
    }
    .hint {
      font-size: 12px;
      color: #9898a0;
      text-align: center;
      max-width: 420px;
      line-height: 1.45;
    }
    .device {
      position: relative;
      width: 393px;
      max-width: 100%;
      border-radius: 44px;
      padding: 12px;
      background: linear-gradient(145deg, #3a3a40, #222228);
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.45);
    }
    .screen {
      position: relative;
      width: 100%;
      height: 852px;
      max-height: calc(100vh - 120px);
      border-radius: 36px;
      overflow: hidden;
      background: #000;
      border: 1px solid #000;
    }
    .island {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 126px;
      height: 37px;
      border-radius: 20px;
      background: #000;
      z-index: 2;
      pointer-events: none;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      background: #fff;
    }
    .bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .bar a, .bar button {
      font: inherit;
      font-size: 12px;
      padding: 6px 12px;
      border-radius: 8px;
      border: 1px solid #444;
      background: #2a2a30;
      color: #e8e8ed;
      text-decoration: none;
      cursor: pointer;
    }
    .bar a:hover, .bar button:hover { background: #35353c; }
    .bar button.on { border-color: #6b9fff; color: #9ec1ff; }
  </style>
</head>
<body>
  <div class="wrap">
    <p class="hint">
      iPhone 17 — 393×852 pt. Split this tab beside <code>index.html</code> in Cursor.
      Auto-reload watches saves when enabled.
    </p>
    <div class="device" aria-label="iPhone 17 preview frame">
      <div class="screen">
        <div class="island" aria-hidden="true"></div>
        <iframe id="app" title="RedMed app" src="/index.html"></iframe>
      </div>
    </div>
    <div class="bar">
      <button type="button" id="reload">Reload now</button>
      <button type="button" id="auto">Auto-reload: off</button>
      <a href="/index.html" target="_blank" rel="noopener">Full page</a>
    </div>
  </div>
  <script>
    var frame = document.getElementById('app');
    var autoBtn = document.getElementById('auto');
    var autoOn = false;
    var timer = null;

    function reloadFrame() {
      frame.src = '/index.html?t=' + Date.now();
    }

    document.getElementById('reload').addEventListener('click', reloadFrame);

    autoBtn.addEventListener('click', function () {
      autoOn = !autoOn;
      autoBtn.textContent = autoOn ? 'Auto-reload: on' : 'Auto-reload: off';
      autoBtn.classList.toggle('on', autoOn);
      if (timer) { clearInterval(timer); timer = null; }
      if (autoOn) timer = setInterval(reloadFrame, 1200);
    });
  </script>
</body>
</html>
