apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'

android {
    namespace 'local.redmed.app'
    compileSdk 35

    defaultConfig {
        applicationId "local.redmed.app"
        minSdk 24
        targetSdk 35
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    // Google's official Trusted Web Activity helper — wraps the hosted
    // web app (index.html on GitHub Pages) as an installable Android app
    // with no browser chrome, using Chrome Custom Tabs under the hood.
    implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
